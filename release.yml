name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      - name: Attest main.js
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: main.js

      - name: Attest styles.css
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: styles.css

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.version.outputs.VERSION }}
          body: |
            ## Chess Vault ${{ steps.version.outputs.VERSION }}

            Sync your Lichess games to Obsidian.

            ### Installation
            Download `main.js`, `manifest.json`, and `styles.css` and place them in your vault's `.obsidian/plugins/chess-vault/` folder.
          files: |
            main.js
            manifest.json
            styles.css